name: Upload to Gist

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload to gist
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: gh gist edit fe6e7931b95b59b773e12848f005b698 --filename find-commits.js dist/find-commits.js
